<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>Serial Scanner → Work Orders</title>

  <!-- Add-to-Home-Screen / PWA -->
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Serial Scan">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%231d4ed8'/%3E%3Crect x='44' y='52' width='92' height='76' rx='10' fill='none' stroke='white' stroke-width='8'/%3E%3Ccircle cx='90' cy='90' r='20' fill='none' stroke='white' stroke-width='8'/%3E%3C/svg%3E">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000; color: #fff; overflow: hidden;
      display: flex; flex-direction: column;
    }
    header {
      padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
      background: #0b1220; text-align: center; flex: 0 0 auto;
    }
    header h1 { font-size: 16px; font-weight: 700; letter-spacing: .2px; }
    header p  { font-size: 11px; color: #93a4c0; margin-top: 2px; }

    #stage { position: relative; flex: 1 1 auto; min-height: 0; background: #000; overflow: hidden; }
    video  { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* Scan reticle */
    #reticle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 68vw; max-width: 320px; aspect-ratio: 1.6 / 1;
      border: 3px solid rgba(255,255,255,.9); border-radius: 14px;
      box-shadow: 0 0 0 100vmax rgba(0,0,0,.45);
      pointer-events: none;
    }
    #reticle::after {
      content: ""; position: absolute; left: 8%; right: 8%; top: 50%;
      height: 2px; background: #38bdf8; box-shadow: 0 0 8px #38bdf8;
      animation: sweep 2s ease-in-out infinite;
    }
    @keyframes sweep { 0%,100% { transform: translateY(-46px); } 50% { transform: translateY(46px); } }

    #status {
      position: absolute; left: 0; right: 0; bottom: 12px; text-align: center;
      font-size: 13px; color: #e5edff; text-shadow: 0 1px 3px #000; padding: 0 16px;
    }
    #diag {
      position: absolute; left: 0; right: 0; top: 8px; text-align: center;
      font-size: 10px; line-height: 1.4; color: #fbbf24; font-family: ui-monospace, Menlo, monospace;
      padding: 0 12px; word-break: break-all; display: none; text-shadow: 0 1px 2px #000;
    }
    #diag.show { display: block; }

    footer {
      flex: 0 0 auto; background: #0b1220;
      padding: 12px 14px calc(env(safe-area-inset-bottom) + 14px);
      display: flex; flex-direction: column; gap: 10px;
    }
    .row { display: flex; gap: 10px; }
    button {
      flex: 1; padding: 13px 10px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; color: #fff;
      background: #1d4ed8; transition: filter .15s, background .15s;
    }
    #captureBtn { padding: 16px 10px; font-size: 16px; font-weight: 700; }
    button.secondary { background: #1f2937; border: 1px solid #374151; }
    button:active { filter: brightness(.88); }
    button:disabled { opacity: .5; }

    .manual { display: flex; gap: 8px; }
    .manual input {
      flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #374151;
      background: #0f172a; color: #fff; font-size: 15px; letter-spacing: .5px;
      text-transform: uppercase;
    }
    .manual input::placeholder { text-transform: none; letter-spacing: 0; color: #64748b; }

    /* Result sheet */
    #sheet {
      position: fixed; inset: 0; background: rgba(0,0,0,.85);
      display: none; align-items: center; justify-content: center; padding: 22px; z-index: 20;
    }
    #sheet.show { display: flex; }
    .card {
      background: #0f172a; border: 1px solid #233048; border-radius: 16px;
      width: 100%; max-width: 380px; padding: 20px; text-align: center;
    }
    .card h2 { font-size: 13px; color: #93a4c0; font-weight: 600; margin-bottom: 6px; }
    .card .serial {
      font-size: 26px; font-weight: 800; letter-spacing: 1px; color: #fff;
      background: #0b1220; border: 1px solid #1d4ed8; border-radius: 10px;
      padding: 14px; width: 100%; text-align: center; text-transform: uppercase;
    }
    .card .raw { font-size: 11px; color: #5b6b86; margin: 10px 0 16px; word-break: break-all; }
    .card .row { margin-top: 4px; }
    .badge {
      display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px;
      border-radius: 999px; margin-bottom: 12px;
    }
    .badge.bc  { background: #064e3b; color: #6ee7b7; }
    .badge.ocr { background: #4a3a08; color: #fde68a; }
    .hint { font-size: 11px; color: #64748b; text-align: center; margin-top: 2px; }
  </style>
</head>
<body>
  <header>
    <h1>Serial → Work Orders</h1>
    <p>Fill the frame with the barcode, then tap “Capture &amp; read”. (Tap title for diagnostics.)</p>
  </header>

  <div id="stage">
    <video id="video" playsinline muted autoplay></video>
    <div id="reticle"></div>
    <div id="diag"></div>
    <div id="status">Starting camera…</div>
  </div>

  <footer>
    <div class="row">
      <button id="captureBtn">📷 Capture &amp; read</button>
    </div>
    <div class="row">
      <button id="ocrBtn" class="secondary">Read printed text</button>
      <button id="restartBtn" class="secondary">Restart camera</button>
    </div>
    <div class="manual">
      <input id="manualInput" placeholder="or type serial e.g. CYM0655-0225" autocapitalize="characters" autocomplete="off">
      <button id="manualGo" style="flex:0 0 auto; width:84px;">Open</button>
    </div>
    <p class="hint">Opens the Service History Record (Repair) list filtered to that serial.</p>
  </footer>

  <!-- Result confirmation sheet -->
  <div id="sheet">
    <div class="card">
      <div id="srcBadge" class="badge bc">BARCODE</div>
      <h2>Detected serial — confirm or edit</h2>
      <input id="serialField" class="serial" autocapitalize="characters" autocomplete="off">
      <div id="rawText" class="raw"></div>
      <div class="row">
        <button id="openBtn">Open Work Orders →</button>
      </div>
      <div class="row">
        <button id="againBtn" class="secondary">Scan again</button>
      </div>
    </div>
  </div>

  <!-- Fallback barcode engine (UMD ZXing). Primary engine is zxing-wasm, loaded on demand. -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script>
  // ──────────────────────────────────────────────────────────────────────────
  // CONFIG — the SharePoint list to open, and how to filter it.
  // The "Serial Number" column's internal name on this list is Serial_x0020_Number.
  // To point this at a different list later, edit SP below.
  // ──────────────────────────────────────────────────────────────────────────
  const SP = {
    base:        'https://cookmedical-my.sharepoint.com/personal/andrew_washburn_cookmedical_com/Lists/Service%20History%20Record/Repair.aspx',
    viewid:      '905e3410-2bd8-49e6-9f74-e7db4c168f8c',
    sortField:   'Completed_x0020_Date',
    isAscending: 'false',
    filterField: 'Serial_x0020_Number',
  };
  function buildUrl(serial) {
    const p = new URLSearchParams();
    p.set('sortField',   SP.sortField);
    p.set('isAscending', SP.isAscending);
    p.set('viewid',      SP.viewid);
    p.set('FilterField1', SP.filterField);
    p.set('FilterValue1', serial);
    return SP.base + '?' + p.toString();
  }

  // Pull a serial out of a barcode payload or OCR text.
  // Handles GS1 DataMatrix (AI 21), parenthesised GS1, and the printed pattern.
  function tidy(s) { return s.replace(/\s+/g, '').replace(/[^A-Z0-9-]/g, ''); }
  // SharePoint stores serials with a dash after the letter prefix, e.g. CYM0655-0225 -> CYM-0655-0225.
  // Insert that dash if it's missing. Idempotent: a serial that's already dashed is left unchanged.
  // Set DASH_AFTER_PREFIX = false to turn this off.
  const DASH_AFTER_PREFIX = true;
  function normalizeSerial(s) {
    s = tidy(String(s || '').toUpperCase());
    if (DASH_AFTER_PREFIX) s = s.replace(/^([A-Z]+)(?=\d)/, '$1-');
    return s;
  }
  function extractSerial(text) {
    if (!text) return null;
    const t = String(text).toUpperCase().replace(/[\x1d\x1e\x1f\x04]/g, ' '); // strip FNC1/GS separators
    // 1) Explicit GS1 AI (21) with parentheses, e.g. "(21)CYM0655-0225"
    let m = t.match(/\(21\)\s*([A-Z0-9][A-Z0-9-]{3,})/);
    if (m) return tidy(m[1]);
    // 2) The distinctive printed serial pattern: letters + digits - digits (CYM0655-0225)
    m = t.match(/[A-Z]{2,4}\d{3,5}-\d{2,5}/);
    if (m) return tidy(m[0]);
    // 3) Bare GS1 stream: after 01(GTIN,14) + 11(date,6), AI 21 runs to end.
    m = t.match(/21([A-Z]{2,4}\d{3,5}-?\d{2,5})\s*$/);
    if (m) return tidy(m[1]);
    return null;
  }

  // ── UI elements ──
  const video       = document.getElementById('video');
  const statusEl    = document.getElementById('status');
  const diagEl      = document.getElementById('diag');
  const sheet       = document.getElementById('sheet');
  const serialField = document.getElementById('serialField');
  const rawText     = document.getElementById('rawText');
  const srcBadge    = document.getElementById('srcBadge');
  const captureBtn  = document.getElementById('captureBtn');
  const ocrBtn      = document.getElementById('ocrBtn');

  function setStatus(msg) { statusEl.textContent = msg; }
  const dbg = [];
  function diag(m) { dbg.unshift(m); if (dbg.length > 4) dbg.pop(); diagEl.textContent = dbg.join('  ·  '); }
  document.querySelector('header').addEventListener('click', () => diagEl.classList.toggle('show'));

  let stream = null, scanning = false, loopTimer = null;

  // ── Primary engine: zxing-wasm (ZXing-C++ via WebAssembly — strong on DataMatrix) ──
  let zxingRead = null, zxingTried = false;
  async function loadWasm() {
    if (zxingTried) return zxingRead;
    zxingTried = true;
    const urls = [
      'https://cdn.jsdelivr.net/npm/zxing-wasm@2/dist/reader/index.js',
      'https://unpkg.com/zxing-wasm@2/dist/reader/index.js',
    ];
    for (const u of urls) {
      try {
        const mod = await import(u);
        if (mod && typeof mod.readBarcodes === 'function') { zxingRead = mod.readBarcodes; diag('engine: wasm ok'); return zxingRead; }
      } catch (e) { diag('wasm load fail: ' + (e.message || e).slice(0, 40)); }
    }
    diag('engine: wasm unavailable — using fallback/OCR');
    return null;
  }

  // Decode an ImageData with zxing-wasm. Returns {serial, raw} | {serial:null, raw} | null.
  async function decodeWasm(imgData) {
    if (!zxingRead) return null;
    try {
      const out = await zxingRead(imgData, { tryHarder: true, maxNumberOfSymbols: 1 });
      if (out && out.length) {
        const raw = out[0].text || '';
        diag('read: ' + raw.slice(0, 28));
        return { serial: extractSerial(raw), raw };
      }
    } catch (e) { diag('decode err: ' + (e.message || e).slice(0, 40)); }
    return null;
  }

  // ── Fallback engine: UMD ZXing on a still image ──
  let umdReader = null;
  function getUmd() {
    if (!window.ZXing) return null;
    if (!umdReader) umdReader = new ZXing.BrowserMultiFormatReader();
    return umdReader;
  }
  async function decodeUmd(canvas) {
    const r = getUmd();
    if (!r) return null;
    try {
      const res = await r.decodeFromImageUrl(canvas.toDataURL('image/png'));
      const raw = res && res.getText ? res.getText() : '';
      if (raw) { diag('umd: ' + raw.slice(0, 28)); return { serial: extractSerial(raw), raw }; }
    } catch (_) { /* no code in frame */ }
    return null;
  }

  // ── Frame capture ──
  function grabFrame(maxSide) {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw) return null;
    let w = vw, h = vh;
    if (maxSide && Math.max(vw, vh) > maxSide) {
      const f = maxSide / Math.max(vw, vh); w = Math.round(vw * f); h = Math.round(vh * f);
    }
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    c.getContext('2d', { willReadFrequently: true }).drawImage(video, 0, 0, w, h);
    return c;
  }

  // ── Camera lifecycle ──
  async function startCamera() {
    stopScanner();
    sheet.classList.remove('show');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play().catch(() => {});
      diag('cam: ' + (video.videoWidth || '?') + 'x' + (video.videoHeight || '?'));
      setStatus('Fill the frame with the barcode, then tap “Capture & read”.');
      if (zxingRead) startContinuous();
    } catch (e) {
      setStatus('Camera unavailable: ' + (e.message || e) + '  (the camera needs HTTPS).');
      diag('cam err: ' + (e.name || e));
    }
  }
  function stopScanner() {
    scanning = false;
    if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
  }
  function stopCamera() {
    stopScanner();
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  // ── Continuous (hands-free) scan, every 600 ms on a downscaled frame ──
  function startContinuous() {
    if (loopTimer || !zxingRead) return;
    scanning = true;
    loopTimer = setInterval(async () => {
      if (!scanning || document.hidden) return;
      const c = grabFrame(1100); if (!c) return;
      const img = c.getContext('2d', { willReadFrequently: true }).getImageData(0, 0, c.width, c.height);
      const hit = await decodeWasm(img);
      if (hit && hit.serial && scanning) onDetect(hit.serial, hit.raw, 'barcode');
    }, 600);
  }

  // ── Deliberate capture: full-res barcode → UMD fallback → OCR ──
  async function capture() {
    captureBtn.disabled = true;
    try {
      setStatus('Reading…');
      await loadWasm();
      const c = grabFrame(0);
      if (!c) { setStatus('Camera not ready yet.'); return; }
      const img = c.getContext('2d', { willReadFrequently: true }).getImageData(0, 0, c.width, c.height);

      let hit = await decodeWasm(img);
      if (!hit || !hit.serial) {
        const u = await decodeUmd(c);
        if (u && u.serial) hit = u;
      }
      if (hit && hit.serial) { onDetect(hit.serial, hit.raw, 'barcode'); return; }

      setStatus('No barcode serial found — reading printed text…');
      const ocr = await ocrCanvas(c);
      if (ocr) { onDetect(ocr.serial, ocr.raw, 'ocr'); return; }

      setStatus('Couldn’t read it. Get closer so the barcode fills the frame, hold steady, then tap again — or type the serial below.');
    } catch (e) {
      setStatus('Read failed: ' + (e.message || e));
    } finally {
      captureBtn.disabled = false;
    }
  }

  // ── OCR (Tesseract, lazy-loaded) on a given canvas, cropped to the centre band ──
  let tesseractLoading = null;
  function loadTesseract() {
    if (window.Tesseract) return Promise.resolve();
    if (tesseractLoading) return tesseractLoading;
    tesseractLoading = new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    return tesseractLoading;
  }
  async function ocrCanvas(srcCanvas) {
    await loadTesseract();
    const w = srcCanvas.width, h = srcCanvas.height;
    const cw = w * 0.9, ch = h * 0.6, cx = (w - cw) / 2, cy = (h - ch) / 2;
    const cc = document.createElement('canvas'); cc.width = cw; cc.height = ch;
    cc.getContext('2d').drawImage(srcCanvas, cx, cy, cw, ch, 0, 0, cw, ch);
    const { data } = await Tesseract.recognize(cc, 'eng', {
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
    });
    diag('ocr: ' + (data.text || '').replace(/\s+/g, ' ').slice(0, 28));
    const s = extractSerial(data.text);
    return s ? { serial: s, raw: data.text.trim() } : null;
  }
  async function readTextOnly() {
    ocrBtn.disabled = true;
    try {
      setStatus('Reading text…');
      const c = grabFrame(0);
      if (!c) { setStatus('Camera not ready yet.'); return; }
      const o = await ocrCanvas(c);
      if (o) onDetect(o.serial, o.raw, 'ocr');
      else setStatus('No serial in the text — try again, get closer, or type it below.');
    } catch (e) {
      setStatus('Text read failed: ' + (e.message || e));
    } finally {
      ocrBtn.disabled = false;
    }
  }

  // ── Result + navigation ──
  function onDetect(serial, raw, source) {
    stopScanner();
    if (navigator.vibrate) navigator.vibrate(60);
    serialField.value = normalizeSerial(serial);
    rawText.textContent = raw && raw !== serial ? ('Read: ' + raw) : '';
    srcBadge.textContent = source === 'ocr' ? 'TEXT (OCR)' : 'BARCODE';
    srcBadge.className = 'badge ' + (source === 'ocr' ? 'ocr' : 'bc');
    sheet.classList.add('show');
  }
  function openFor(serial) {
    serial = normalizeSerial(serial);
    if (!serial) { serialField.focus(); return; }
    window.location.href = buildUrl(serial);
  }

  // ── Wiring ──
  captureBtn.addEventListener('click', capture);
  ocrBtn.addEventListener('click', readTextOnly);
  document.getElementById('restartBtn').addEventListener('click', startCamera);
  document.getElementById('againBtn').addEventListener('click', startCamera);
  document.getElementById('openBtn').addEventListener('click', () => openFor(serialField.value));
  document.getElementById('manualGo').addEventListener('click', () => openFor(document.getElementById('manualInput').value));
  document.getElementById('manualInput').addEventListener('keydown', e => { if (e.key === 'Enter') openFor(e.target.value); });
  document.addEventListener('visibilitychange', () => { if (document.hidden) stopScanner(); else if (stream && zxingRead && !loopTimer && !sheet.classList.contains('show')) startContinuous(); });

  // ── Kick off ──
  startCamera();
  loadWasm().then(() => { if (stream && !loopTimer && !sheet.classList.contains('show')) startContinuous(); });
  </script>
</body>
</html>
